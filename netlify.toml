# Lumen — Netlify configuration
# No build step: Lumen is a static app served directly from the repo root.

[build]
  publish = "."

# ── Service worker: must never be cached ─────────────────────────────────────
# If sw.js is cached by a CDN or browser, updates won't reach installed PWAs.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ── PWA manifest ─────────────────────────────────────────────────────────────
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# ── Icons: long-lived cache ───────────────────────────────────────────────────
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

# ── JS + CSS: long-lived cache ────────────────────────────────────────────────
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── Security headers (all routes) ────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"
    Cross-Origin-Opener-Policy = "same-origin"
